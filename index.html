<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZiedYT OBS Controller</title>
    <script src="https://cdn.jsdelivr.net/npm/obs-websocket-js@5.0.5/dist/obs-websocket.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0e0e10; color: #efeff1; padding: 20px; }
        .card { background: #18181b; border-radius: 12px; padding: 20px; max-width: 450px; margin: auto; border: 1px solid #303032; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input, button { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: 1px solid #303032; background: #0e0e10; color: white; box-sizing: border-box; }
        button { background: #9147ff; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #772ce8; }
        #console-log { background: #000; color: #00ff41; font-family: monospace; font-size: 11px; height: 160px; overflow-y: auto; padding: 10px; margin-top: 15px; border-radius: 4px; white-space: pre-wrap; border: 1px solid #333; }
        .hidden { display: none; }
        .status { font-size: 0.8em; margin-bottom: 5px; font-weight: bold; }
        .success { color: #00ff7f; }
        .error { color: #ff4f4f; }
    </style>
</head>
<body>

<div class="card">
    <h3 style="margin-top:0; color:#9147ff;">OBS Controller</h3>
    
    <div id="setup-ui">
        <input type="password" id="obsPass" placeholder="OBS WebSocket Password">
        <input type="text" id="sceneName" placeholder="OBS Scene Name">
        <input type="text" id="sourceName" placeholder="OBS Source Name">
        <input type="text" id="rewardId" placeholder="Reward ID (Optional)">
        <input type="number" id="duration" value="5" placeholder="Seconds">
        <label style="font-size: 0.85em; cursor:pointer;"><input type="checkbox" id="stackTime"> Stack Duration? (e.g. 5s + 5s = 10s)</label>
        <button id="authBtn">Authorize Twitch & Start</button>
    </div>

    <div id="active-ui" class="hidden">
        <div id="obsStatus" class="status">OBS: Disconnected</div>
        <div id="twitchStatus" class="status">Twitch: Disconnected</div>
        <div id="timer-box" style="font-size: 3em; text-align: center; color: #9147ff; margin: 10px 0;">0s</div>
        <button id="testBtn">Manual Test Trigger</button>
        <button onclick="localStorage.clear(); location.reload();" style="background:none; color:#666; font-size:10px; margin-top:10px;">Reset All Data</button>
    </div>

    <div id="console-log">-- System Ready --\n</div>
</div>

<script>
    const CLIENT_ID = 'e45dc57m1ml94eoh5tt04txp6ij8ed';
    const REDIRECT_URI = window.location.origin + window.location.pathname;
    let obs;
    let timeLeft = 0;
    let timerActive = false;

    const getEl = (id) => document.getElementById(id);
    const log = (msg, isErr = false) => {
        const box = getEl('console-log');
        box.innerText += `[${new Date().toLocaleTimeString()}] ${isErr ? '❌' : 'ℹ️'} ${msg}\n`;
        box.scrollTop = box.scrollHeight;
    };

    // Load saved settings
    const fields = ['obsPass', 'sceneName', 'sourceName', 'rewardId', 'duration', 'stackTime'];
    fields.forEach(id => {
        const val = localStorage.getItem(id);
        if (val !== null) {
            if (getEl(id).type === 'checkbox') getEl(id).checked = (val === 'true');
            else getEl(id).value = val;
        }
    });

    getEl('authBtn').onclick = () => {
        fields.forEach(id => localStorage.setItem(id, getEl(id).type === 'checkbox' ? getEl(id).checked : getEl(id).value));
        const scopes = encodeURIComponent('channel:read:redemptions moderation:read');
        window.location.href = `https://id.twitch.tv/oauth2/authorize?response_type=token&client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${scopes}`;
    };

    const hash = new URLSearchParams(window.location.hash.replace('#', '?'));
    const token = hash.get('access_token');

    if (token) {
        getEl('setup-ui').classList.add('hidden');
        getEl('active-ui').classList.remove('hidden');
        window.history.replaceState(null, null, window.location.pathname);
        start(token);
    }

    async function start(token) {
        obs = new OBSWebSocket();
        try {
            await obs.connect('ws://127.0.0.1:4455', getEl('obsPass').value);
            getEl('obsStatus').innerText = "OBS: Connected";
            getEl('obsStatus').classList.add('success');
            log("Connected to OBS.");
        } catch (e) { log("OBS Connection Failed! Check port 4455/password.", true); }

        try {
            const userRes = await fetch('https://api.twitch.tv/helix/users?login=ZiedYT', {
                headers: { 'Authorization': `Bearer ${token}`, 'Client-Id': CLIENT_ID }
            });
            const userData = await userRes.json();
            const userId = userData.data[0].id;
            log(`Listening to ZiedYT (ID: ${userId})`);

            const socket = new WebSocket('wss://pubsub-edge.twitch.tv');
            socket.onopen = () => {
                getEl('twitchStatus').innerText = "Twitch: Connected";
                getEl('twitchStatus').classList.add('success');
                socket.send(JSON.stringify({
                    type: 'LISTEN',
                    data: { topics: [`channel-points-channel-v1.${userId}`, `chat_moderator_actions.${userId}.${userId}`], auth_token: token }
                }));
                log("Twitch PubSub Active.");
            };

            socket.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.type === 'MESSAGE') {
                    const inner = JSON.parse(msg.data.message);
                    if (inner.data?.redemption) {
                        const rID = inner.data.redemption.reward.id;
                        log(`Redeem: ${inner.data.redemption.reward.title} (ID: ${rID})`);
                        if (rID === getEl('rewardId').value || !getEl('rewardId').value) triggerEffect();
                    }
                    if (inner.data?.moderation_action === 'timeout' || inner.data?.moderation_action === 'ban') {
                        log(`Mod Action: ${inner.data.moderation_action} on ${inner.data.target_user_login}`);
                        triggerEffect();
                    }
                }
            };
            setInterval(() => socket.send(JSON.stringify({type:'PING'})), 240000);
        } catch (e) { log("Twitch Init Error: " + e.message, true); }
    }

    async function triggerEffect() {
        const dur = parseInt(getEl('duration').value);
        if (getEl('stackTime').checked) timeLeft += dur; else timeLeft = dur;
        getEl('timer-box').innerText = timeLeft + "s";

        const scene = getEl('sceneName').value;
        const source = getEl('sourceName').value;

        try {
            const { sceneItems } = await obs.call('GetSceneItemList', { sceneName: scene });
            const item = sceneItems.find(i => i.sourceName === source);
            if (!item) throw new Error("Source not found");

            await obs.call('SetSceneItemEnabled', { sceneName: scene, sceneItemId: item.sceneItemId, sceneItemEnabled: true });

            if (!timerActive) {
                timerActive = true;
                const interval = setInterval(async () => {
                    timeLeft--;
                    getEl('timer-box').innerText = (timeLeft > 0 ? timeLeft : 0) + "s";
                    if (timeLeft <= 0) {
                        clearInterval(interval);
                        timerActive = false;
                        await obs.call('SetSceneItemEnabled', { sceneName: scene, sceneItemId: item.sceneItemId, sceneItemEnabled: false });
                        log("Timer Finished.");
                    }
                }, 1000);
            }
        } catch (e) { log("OBS Trigger Error: " + e.message, true); }
    }
    getEl('testBtn').onclick = triggerEffect;
</script>
</body>
</html>
